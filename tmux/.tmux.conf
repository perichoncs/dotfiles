# ── Prefix ────────────────────────────────────────────────────
# Ctrl-Space as prefix (no conflict with Cosmic DE Super key)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General settings ──────────────────────────────────────────
set -g base-index 1          # windows start at 1
setw -g pane-base-index 1    # panes start at 1
set -g renumber-windows on   # renumber when a window is closed
set -g mouse on              # mouse support
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
setw -g mode-keys vi         # vi mode in copy mode

# ── Splits (intuitive) ───────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind t split-window -v -l 25% # split vertically to simil terminal 25%

# ── Pane navigation (vim-tmux-navigator) ──────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +([[:alnum:]_./-]+/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# ── Pane resize (Prefix + Shift-vim keys) ─────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ───────────────────────────────────────────────────
bind -n M-H previous-window
bind -n M-L next-window
bind c new-window -c "#{pane_current_path}"

# ── Sessions ──────────────────────────────────────────────────
bind S new-session           # Prefix + S → new session
bind s choose-tree -Zs       # Prefix + s → switch sessions
# Prefix + $ → rename session (default, kept)

# ── Reload config ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ── Copy mode (vi-style) ─────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# ── Plugins ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# ── Session persistence (resurrect + continuum) ──────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
